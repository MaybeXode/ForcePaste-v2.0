[Settings]

; =======================================================================
;                         HOTKEYS (CHEAT SHEET)
; =======================================================================
; Symbol   | Key              | Example   | Result
; ---------+------------------+-----------+------------------------------
;    #     | Windows (Win)    | #n        | Win + N
;    !     | Alt              | !d        | Alt + D
;    ^     | Control (Ctrl)   | ^c        | Ctrl + C
;    +     | Shift            | +s        | Shift + S
; ---------+------------------+-----------+------------------------------
;    <!    | Left Alt         | <!f       | LeftAlt + F
;    >!    | Right Alt        | >!f       | RightAlt + F
;    <^    | Left Ctrl        | <^z       | LeftCtrl + Z
;    >+    | Right Shift      | >+q       | RightShift + Q
; ---------+------------------+-----------+------------------------------
;    &     | Combination      | c & v     | Hold C + Press V
;    *     | Any modifier     | *f        | Works with any Ctrl/Alt
;    ~     | No blocking      | ~LButton  | Click works in system
;    $     | Prot. from cycle | $a        | Button does not call itself
; =======================================================================

; Hotkey for pasting
; Default: Ctrl + Shift + S
; See the cheat sheet above for more hotkey options

Hotkey=^+s

; Paste mode: instant (fast) or human (typing simulation)
Mode=instant

; Delay between characters in milliseconds (only for human mode)
Delay=10

; Show notifications in tray / near cursor (1 - enabled, 0 - disabled)
Notifications=0
